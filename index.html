<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
        <path d="M4 14h16v2a4 4 0 01-4 4H8a4 4 0 01-4-4v-2z"/>
        <path d="M8 18v2a2 2 0 002 2h4a2 2 0 002-2v-2"/>
      </svg>
      <h1>AI Chat</h1>
    </div>
    <button id="theme-toggle" aria-label="Toggle theme">
      <svg class="sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg class="moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
  </header>
  <main>
    <div id="chat-container">
      <div id="welcome">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
          <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
          <path d="M4 14h16v2a4 4 0 01-4 4H8a4 4 0 01-4-4v-2z"/>
          <path d="M8 18v2a2 2 0 002 2h4a2 2 0 002-2v-2"/>
        </svg>
        <p>Ask me anything!</p>
      </div>
      <div id="messages"></div>
    </div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
      <button id="send-btn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
